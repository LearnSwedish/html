<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hörförståelse 1</title>

<style>
:root {
    --bg:#f0f2f5;
    --card:#fff;
    --text:#333;
    --accent:#1a73e8;
    --border:#ddd;
    --correct:#2e7d32;
    --wrong:#c62828;
}

body.dark {
    --bg:#121212;
    --card:#1e1e1e;
    --text:#eee;
    --accent:#4dabf7;
    --border:#333;
}

body {
    font-family:system-ui;
    background:var(--bg);
    color:var(--text);
    max-width:720px;
    margin:40px auto;
    padding:20px;

    transition: background-color 0.3s ease, color 0.3s ease;
}

.container {
    background:var(--card);
    padding:30px;
    border-radius:10px;
    border:1px solid var(--border);

    transition: background-color 0.3s ease, border-color 0.3s ease;
}

.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.toggle {
    cursor: pointer;
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;

    width: 110px;              /* fast bredd */
    text-align: center;        /* centrerad text */
    display: inline-block;

    transition: all 0.2s ease;
}

.toggle:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

.toggle, .option, button {
    transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
}

.option {
    display:block;
    padding:10px;
    margin:6px 0;
    border:1px solid var(--border);
    border-radius:6px;
}

button {
    width:100%;
    margin-top:15px;
    padding:12px;
    background:var(--accent);
    color:white;
    border:none;
    border-radius:6px;
}

.result-item {
    margin-bottom:20px;
    padding:10px;
    border-left:4px solid var(--border);
}

.correct { border-color:var(--correct); }
.wrong { border-color:var(--wrong); }

.small { font-size:14px; opacity:0.8; }
</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h2>Hörförståelse 1</h2>
<div class="toggle" onclick="toggleDark()">Dark mode</div>
</div>

<p id="status"><strong>Frågorna visas först när du har lyssnat på hela ljudklippet.</strong></p>

<audio id="audio" controls style="width:100%">
<source src="https://learnswedish.github.io/html/alg-och-lax-hotade.mp3">
</audio>

<div id="quiz"></div>
<div id="result" style="display:none"></div>

</div>

<script>
const questions = [
{
q:"Varför är flera fiskar nära hotade?",
correct:["a","b"],
answers:[
["a","Fiskarna är nära hotade eftersom man har fångat för mycket fisk."],
["b","Fiskarna är nära hotade eftersom förvaltningen av fisk behöver bli bättre."],
["c","Fiskarna är nära hotade eftersom de har drabbats av många sjukdomar."],
["d","Fiskarna är nära hotade eftersom havet har blivit varmare överallt."]
]
},
{
q:"Vilka fiskar nämns i klippet?",
correct:["a","b"],
answers:[
["a","Lax och sill nämns som exempel på hotade fiskar."],
["b","Öring nämns också som en fisk som är nära hotad."],
["c","Torsk och makrill nämns som de mest hotade fiskarna."],
["d","Endast exotiska fiskarter nämns i klippet."]
]
},
{
q:"Vad sägs om igelkottar och älgar?",
correct:["a","b"],
answers:[
["a","Igelkottarna har blivit färre i Sverige."],
["b","Älgen har minskat i antal i stora delar av landet."],
["c","Igelkottarna har ökat kraftigt de senaste åren."],
["d","Älgar finns numera bara i norra Sverige."]
]
},
{
q:"Varför har älgen minskat?",
correct:["a"],
answers:[
["a","Älgen har minskat eftersom många har skjutits under jakt."],
["b","Älgen har minskat eftersom den har flyttat till andra länder."],
["c","Älgen har minskat eftersom den inte hittar vatten."],
["d","Älgen har minskat eftersom den inte längre får några kalvar."]
]
},
{
q:"Vad sägs om havsörnen?",
correct:["a","b"],
answers:[
["a","Havsörnen var tidigare hotad men är det inte längre."],
["b","Havsörnen har återhämtat sig och blivit fler."],
["c","Havsörnen är fortfarande akut hotad i hela landet."],
["d","Havsörnen har nästan helt försvunnit från Sverige."]
]
},
{
q:"Vad säger Ulf Bjelke om fisk?",
correct:["a","b"],
answers:[
["a","Han säger att problemet framför allt beror på fiske."],
["b","Han säger att vi behöver en bättre förvaltning av fisk."],
["c","Han säger att fiskarna främst påverkas av rovdjur."],
["d","Han säger att klimatet inte har någon betydelse alls."]
]
},
{
q:"Vad innebär att ett djur är nära hotat?",
correct:["a"],
answers:[
["a","Det innebär att djuret riskerar att försvinna om utvecklingen fortsätter."],
["b","Det innebär att djuret redan har försvunnit från Sverige."],
["c","Det innebär att djuret bara finns i djurparker."],
["d","Det innebär att djuret är farligt för människor."]
]
}
];

let index = 0;
let userAnswers = [];

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

function render(){
    const q = questions[index];
    const shuffled = shuffle([...q.answers]);

    document.getElementById("quiz").innerHTML = `
        <p><strong>${index+1}/${questions.length}</strong> ${q.q}</p>
        ${shuffled.map(a=>`
            <label class="option">
                <input type="checkbox" value="${a[0]}">
                ${a[1]}
            </label>
        `).join("")}
        <button id="next" disabled>Fortsätt</button>
    `;

    const inputs = document.querySelectorAll("input");
    inputs.forEach(i=>{
        i.addEventListener("change",()=>{
            document.getElementById("next").disabled = false;
        });
    });

    document.getElementById("next").onclick = ()=>{
        const selected = [...inputs]
            .filter(i=>i.checked)
            .map(i=>i.value);

        userAnswers.push(selected);
        index++;

        if(index < questions.length){
            render();
        } else {
            showResult();
        }
    };
}

function arraysEqual(a,b){
    return a.length===b.length && a.every(v=>b.includes(v));
}

function scoreQuestion(user, correct){
    let points = 0;

    user.forEach(u=>{
        if(correct.includes(u)) {
            points += 1;     // rätt val
        } else {
            points -= 1;     // fel val
        }
    });

    return Math.max(points, 0); // aldrig negativt
}

function showResult(){
    document.getElementById("quiz").style.display="none";
    const result = document.getElementById("result");

    let html = "<h3>Resultat</h3>";
    let totalPoints = 0;
    let maxPoints = 0;

    questions.forEach((q,i)=>{
        const correct = q.correct;
        const user = userAnswers[i];

        const points = scoreQuestion(user, correct);
        const max = correct.length;

        totalPoints += points;
        maxPoints += max;

        const isFullyCorrect = points === max;

        html += `
        <div class="result-item ${isFullyCorrect?"correct":"wrong"}">
            <strong>Fråga ${i+1}:</strong> ${points}/${max} poäng
            ${!isFullyCorrect ? `
                <div class="small">
                Rätt svar: ${q.answers
                    .filter(a=>correct.includes(a[0]))
                    .map(a=>a[1]).join(" / ")}
                </div>` : ""}
        </div>`;
    });

    html = `<h2>${totalPoints}/${maxPoints} poäng</h2>` + html;

    result.innerHTML = html;
    result.style.display="block";
}

document.getElementById("audio").onended = ()=>{
    document.getElementById("status").innerHTML = "Du kan nu börja svara på frågorna. <strong>NOTERA! Vissa frågor har mer än ett rätt svar.</strong>";
    render();
};

function toggleDark(){
    document.body.classList.toggle("dark");

    const isDark = document.body.classList.contains("dark");
    localStorage.setItem("dark", isDark);

    document.querySelector(".toggle").innerText = isDark ? "Ljust tema" : "Mörkt tema";
}

const toggleBtn = document.querySelector(".toggle");

if(localStorage.getItem("dark")==="true"){
    document.body.classList.add("dark");
    toggleBtn.innerText = "Ljust tema";
} else {
    toggleBtn.innerText = "Mörkt tema";
}

if(localStorage.getItem("dark")==="true"){
    document.body.classList.add("dark");
}
</script>

</body>
</html>
