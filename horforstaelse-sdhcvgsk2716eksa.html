<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hörförståelse 3</title>

<style>
:root {
    --bg:#f0f2f5;
    --card:#fff;
    --text:#333;
    --accent:#1a73e8;
    --border:#ddd;
    --correct:#2e7d32;
    --wrong:#c62828;
}

body.dark {
    --bg:#121212;
    --card:#1e1e1e;
    --text:#eee;
    --accent:#4dabf7;
    --border:#333;
}

body {
    font-family:system-ui;
    background:var(--bg);
    color:var(--text);
    max-width:720px;
    margin:40px auto;
    padding:20px;

    transition: background-color 0.3s ease, color 0.3s ease;
}

.container {
    background:var(--card);
    padding:30px;
    border-radius:10px;
    border:1px solid var(--border);

    transition: background-color 0.3s ease, border-color 0.3s ease;
}

.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.toggle {
    cursor: pointer;
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;

    width: 110px;              /* fast bredd */
    text-align: center;        /* centrerad text */
    display: inline-block;

    transition: all 0.2s ease;
}

.toggle:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

.toggle, .option, button {
    transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
}

.option {
    display:block;
    padding:10px;
    margin:6px 0;
    border:1px solid var(--border);
    border-radius:6px;
}

button {
    width:100%;
    margin-top:15px;
    padding:12px;
    background:var(--accent);
    color:white;
    border:none;
    border-radius:6px;
}

.result-item {
    margin-bottom:20px;
    padding:10px;
    border-left:4px solid var(--border);
}

.correct { border-color:var(--correct); }
.wrong { border-color:var(--wrong); }

.small { font-size:14px; opacity:0.8; }
</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h2>Hörförståelse 3</h2>
<div class="toggle" onclick="toggleDark()">Dark mode</div>
</div>

<p id="status"><strong>Frågorna visas först när du har lyssnat på hela ljudklippet.</strong></p>

<audio id="audio" controls style="width:100%">
<source src="https://learnswedish.github.io/html/karolinska-sjukhuset.mp3">
</audio>

<div id="quiz"></div>
<div id="result" style="display:none"></div>

</div>

<script>
const questions = [
{
q:"Vad sägs om Karolinska universitetssjukhuset?",
correct:["a","b"],
answers:[
["a","Karolinska universitetssjukhuset är ett av de bästa sjukhusen i världen."],
["b","Sjukhuset ligger i Stockholm."],
["c","Sjukhuset är det enda sjukhuset i Sverige."],
["d","Sjukhuset är nyligen byggt och har ingen historia."]
]
},
{
q:"Vad visar listan från Newsweek?",
correct:["a","b"],
answers:[
["a","Karolinska sjukhuset är på fjärde plats i världen."],
["b","Karolinska är det bästa sjukhuset i Europa enligt listan."],
["c","Karolinska är det bästa sjukhuset i världen."],
["d","Karolinska är det enda europeiska sjukhuset på listan."]
]
},
{
q:"Vad sägs om placeringen över tid?",
correct:["a"],
answers:[
["a","Sjukhuset har varit bland de tio bästa i världen i sju år i rad."],
["b","Sjukhuset har bara nyligen kommit in på listan."],
["c","Sjukhuset har sjunkit kraftigt i rankning de senaste åren."],
["d","Sjukhuset har aldrig tidigare varit med på listan."]
]
},
{
q:"Vad bygger rankningen på?",
correct:["a","b"],
answers:[
["a","Man har tittat på hur patienter upplever kvaliteten på vården."],
["b","Man har tittat på resultat av behandlingar."],
["c","Man har bara tittat på hur många anställda sjukhusen har."],
["d","Man har enbart jämfört byggnadernas storlek."]
]
},
{
q:"Vad säger sjukhusdirektören?",
correct:["a","b"],
answers:[
["a","Han säger att placeringen är ett erkännande av sjukvården."],
["b","Han säger att forskning och utbildning håller världsledande nivå."],
["c","Han säger att sjukhuset inte bryr sig om rankningar."],
["d","Han säger att sjukhuset har stora problem."]
]
},
{
q:"Vad sägs om listan i stort?",
correct:["a","b"],
answers:[
["a","Listan innehåller sjukhus från över 30 länder."],
["b","Det bästa sjukhuset i världen är Mayo Clinic i USA."],
["c","Alla sjukhus på listan ligger i Europa."],
["d","Listan innehåller bara offentliga sjukhus."]
]
},
{
q:"Vilken slutsats kan man dra av texten?",
correct:["a"],
answers:[
["a","Karolinska sjukhuset håller en mycket hög internationell nivå."],
["b","Karolinska är det enda sjukhuset som håller hög kvalitet."],
["c","Svensk sjukvård är sämre än i andra länder."],
["d","Internationella listor är helt betydelselösa."]
]
}
];

let index = 0;
let userAnswers = [];

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

function render(){
    const q = questions[index];
    const shuffled = shuffle([...q.answers]);

    document.getElementById("quiz").innerHTML = `
        <p><strong>${index+1}/${questions.length}</strong> ${q.q}</p>
        ${shuffled.map(a=>`
            <label class="option">
                <input type="checkbox" value="${a[0]}">
                ${a[1]}
            </label>
        `).join("")}
        <button id="next" disabled>Fortsätt</button>
    `;

    const inputs = document.querySelectorAll("input");
    inputs.forEach(i=>{
        i.addEventListener("change",()=>{
            document.getElementById("next").disabled = false;
        });
    });

    document.getElementById("next").onclick = ()=>{
        const selected = [...inputs]
            .filter(i=>i.checked)
            .map(i=>i.value);

        userAnswers.push(selected);
        index++;

        if(index < questions.length){
            render();
        } else {
            showResult();
        }
    };
}

function arraysEqual(a,b){
    return a.length===b.length && a.every(v=>b.includes(v));
}

function scoreQuestion(user, correct){
    let points = 0;

    user.forEach(u=>{
        if(correct.includes(u)) {
            points += 1;     // rätt val
        } else {
            points -= 1;     // fel val
        }
    });

    return Math.max(points, 0); // aldrig negativt
}

function showResult(){
    document.getElementById("quiz").style.display="none";
    const result = document.getElementById("result");

    let html = "<h3>Resultat</h3>";
    let totalPoints = 0;
    let maxPoints = 0;

    questions.forEach((q,i)=>{
        const correct = q.correct;
        const user = userAnswers[i];

        const points = scoreQuestion(user, correct);
        const max = correct.length;

        totalPoints += points;
        maxPoints += max;

        const isFullyCorrect = points === max;

        html += `
        <div class="result-item ${isFullyCorrect?"correct":"wrong"}">
            <strong>Fråga ${i+1}:</strong> ${points}/${max} poäng
            ${!isFullyCorrect ? `
                <div class="small">
                Rätt svar: ${q.answers
                    .filter(a=>correct.includes(a[0]))
                    .map(a=>a[1]).join(" / ")}
                </div>` : ""}
        </div>`;
    });

    html = `<h2>${totalPoints}/${maxPoints} poäng</h2>` + html;

    result.innerHTML = html;
    result.style.display="block";
}

document.getElementById("audio").onended = ()=>{
    document.getElementById("status").innerHTML = "Du kan nu börja svara på frågorna. <strong>NOTERA! Vissa frågor har mer än ett rätt svar.</strong>";
    render();
};

function toggleDark(){
    document.body.classList.toggle("dark");

    const isDark = document.body.classList.contains("dark");
    localStorage.setItem("dark", isDark);

    document.querySelector(".toggle").innerText = isDark ? "Ljust tema" : "Mörkt tema";
}

const toggleBtn = document.querySelector(".toggle");

if(localStorage.getItem("dark")==="true"){
    document.body.classList.add("dark");
    toggleBtn.innerText = "Ljust tema";
} else {
    toggleBtn.innerText = "Mörkt tema";
}

if(localStorage.getItem("dark")==="true"){
    document.body.classList.add("dark");
}
</script>

</body>
</html>
