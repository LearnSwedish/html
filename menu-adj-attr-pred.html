<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swedish Adjective Agreement</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        p.description {
            color: var(--text-secondary);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            color: var(--accent-color);
        }

        .example {
            font-style: italic;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        @media (max-width: 500px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Swedish Adjectives</h1>
        <p class="description">Select a category below to practise your adjective agreement skills.</p>

        <div class="grid">
            <div class="card">
                <div>
                    <h2>Predicative Use</h2>
                    <p class="example">Example: Bilen är röd</p>
                </div>
                <a href="https://learnswedish.github.io/html/adj-dist-agreement.html" target="_blank" rel="noopener noreferrer" class="btn">Start Exercise</a>
            </div>

            <div class="card">
                <div>
                    <h2>Attributive Use</h2>
                    <p class="example">Example: En röd bil</p>
                </div>
                <a href="https://learnswedish.github.io/html/adjective-regular-easy.html" target="_blank" rel="noopener noreferrer" class="btn">Start Exercise</a>
            </div>
        </div>
    </div>

</body>
</html>
