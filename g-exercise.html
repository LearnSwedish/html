      opacity: 0;
      visibility: hidden;
      z-index: 9999;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: opacity 0.2s, visibility 0.2s, transform 0.2s;
      transform: translate(-50%, 10px);
      left: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .js-tooltip.visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, 0);

    .theory-btn { color: var(--accent); text-decoration: none; transition: .2s; }
    .theory-btn:hover { background: var(--accent); color: #fff; }
    
    .theme-toggle { position:fixed; top:20px; left:20px; background:var(--score-bg); border:1px solid var(--border); border-radius:999px; padding:8px 14px; display:flex; align-items:center; gap:10px; z-index: 100; }
    .toggle-switch { position:relative; width:44px; height:24px; cursor:pointer; }
    .toggle-switch input { opacity:0; width:0; height:0; }
    .toggle-track { position:absolute; inset:0; background:#c5cde0; border-radius:999px; transition:.3s; border:1px solid var(--border); }

    .toggle-knob { position:absolute; top:50%; left:4px; width:16px; height:16px; border-radius:50%; background:#fff; transform:translateY(-50%); transition:.3s; }

    .header h1 { font-family:'Playfair Display',serif; font-size: 2.2rem; margin-bottom: 10px; }

    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px 28px; box-shadow:var(--shadow); }

    .progress-track { flex:1; height:6px; background:var(--card2); border-radius:999px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--accent); width:0%; transition:width .3s; }
    
    .word-box { background:var(--card2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:40px 20px; text-align:center; margin-bottom:16px; }

    .feedback.wrong { background: var(--err-bg); color: var(--err-text); }

      left: 0;
      width: 100vw;
      height: 100vh;

      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;

    .modal-content {
      background: var(--card);
      color: var(--text);
      padding: 2.5rem;

// QUIZ ENGINE
let items = [], currentIndex = 0, score = 0, answeredCount = 0, hasAnswered = false;
 
const jsTooltip = document.createElement('div');
jsTooltip.className = 'js-tooltip';
document.body.appendChild(jsTooltip);
 
function buildWordHTML(item) {
    const idx = item.pos - 1;
    const w = item.word;
    const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const inner = esc(w.slice(0, idx)) + `<span class="target-letter">${esc(w[idx])}</span>` + esc(w.slice(idx + 1));
    return `<span class="has-tooltip" data-trans="${item.trans}" data-cat="${item.cat}">${inner}</span>`;
}
 
function renderCurrentItem() {
    const item = items[currentIndex];
    const total = items.length;
 
    if (!item) {
        document.getElementById("progressFill").style.width = "100%";
        document.getElementById("progressLabel").textContent = `${total} / ${total}`;
        document.getElementById("wordBox").innerHTML = `<h2>Complete! Score: ${score}/${answeredCount}</h2>`;
        document.getElementById("choices").innerHTML = "";
        return;
    }
 
    hasAnswered = false;
    document.getElementById("progressFill").style.width = ((currentIndex / total) * 100) + "%";
    document.getElementById("progressLabel").textContent = `${currentIndex + 1} / ${total}`;
    document.getElementById("wordBox").innerHTML = `<p class="word">${buildWordHTML(item)}</p>`;
    document.getElementById("feedbackText").textContent = "Choose an option.";
    document.getElementById("feedback").className = "feedback";
    
    const choices = document.getElementById("choices");
    choices.innerHTML = "";
    ["g", "j", "sj"].forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = opt;
        btn.onclick = () => handleAnswer(opt, btn);
        choices.appendChild(btn);
    });
}
 
function closeModal() {
    document.getElementById('infoModal').style.display = 'none';
}
 
function showPronunciationModal(alternative) {
    const modal = document.getElementById('infoModal');
    const textElement = document.getElementById('modalText');
    
    const pronNames = {
        'g': 'a hard "g" sound',
        'j': 'a soft "j" sound',
        'sj': 'a "sh" sound'
    };
 
    textElement.innerHTML = `Correct! Note that this word can also be pronounced with <strong>${pronNames[alternative]}</strong>.`;
    modal.style.display = 'flex';
}
 
function handleAnswer(selected, btn) {
    if (hasAnswered) return;
    hasAnswered = true;
    answeredCount++;
    const item = items[currentIndex];
    
    const alternatives = item.pron.split(' or ');
    const isCorrect = alternatives.includes(selected);
 
    document.querySelectorAll(".choice-btn").forEach(b => {
        b.disabled = true;
        if (alternatives.includes(b.textContent)) {
            b.classList.add("correct");
        }
    });
 
    if (isCorrect) {
        score++;
        document.getElementById("feedbackText").textContent = "Correct!";
        document.getElementById("feedback").className = "feedback correct";
 
        if (alternatives.length > 1) {
            const otherPron = alternatives.find(p => p !== selected);
            showPronunciationModal(otherPron);
        }
    } else {
        btn.classList.add("wrong");
        const correctText = alternatives.join(' or ');
        document.getElementById("feedbackText").textContent = `Incorrect. The correct answer is: ${correctText}.`;
        document.getElementById("feedback").className = "feedback wrong";
    }
    document.getElementById("scoreNum").textContent = score;
}
 
function resetQuiz() {
    items = [...rawData].sort(() => Math.random() - 0.5);
    currentIndex = 0; score = 0; answeredCount = 0;
    document.getElementById("scoreNum").textContent = 0;
    document.getElementById("scoreTotal").textContent = items.length;
    renderCurrentItem();
}
 
document.getElementById("nextBtn").onclick = () => {
    if (currentIndex < items.length - 1) { currentIndex++; renderCurrentItem(); }
    else { currentIndex = items.length; renderCurrentItem(); }
};
 
// TOOLTIP LOGIC
document.addEventListener('mouseover', e => {
    const target = e.target.closest('.has-tooltip');
    if (!target) return;
 
    jsTooltip.innerHTML = `
        <span class="tooltip-translation">${target.dataset.trans}</span>
        <span class="tooltip-category">${target.dataset.cat}</span>
    `;
 
    const rect = target.getBoundingClientRect();
    const x = rect.left + (rect.width / 2);
    jsTooltip.style.left = x + "px";
    jsTooltip.style.top = "auto";
    jsTooltip.style.bottom = (window.innerHeight - rect.top + 10) + "px";
    
    jsTooltip.classList.add('visible');
});
 
document.addEventListener('mouseout', e => {
    if (e.target.closest('.has-tooltip')) {
        jsTooltip.classList.remove('visible');
    }
});
 
// THEME
document.getElementById("themeToggle").onchange = (e) => {
    document.documentElement.dataset.theme = e.target.checked ? "dark" : "light";
};
 
document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") closeModal();
});
 
document.getElementById('infoModal').onclick = function(e) {
    if (e.target === this) closeModal();
};
 
resetQuiz();
