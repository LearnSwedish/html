function findTargetIndex(word, extra) {
  const lower = word.toLowerCase();
  const pos = [];
  for (let i = 0; i < lower.length; i++) {
    if (lower[i] === 'g') pos.push(i);
  }
  
  if (pos.length === 0) return -1;

  const hint = (extra || "").toLowerCase().trim();

  // Kolla om hinte innehåller "g" följt av en siffra (t.ex. "g2")
  const match = hint.match(/g(\d+)/);
  if (match) {
    const targetNum = parseInt(match[1], 10); // t.ex. 2
    // Returnera index för det g-et (justerat för 0-indexering: g1 = pos[0])
    return pos[targetNum - 1] !== undefined ? pos[targetNum - 1] : pos[0];
  }

  // Behåll gamla logiken som fallback
  if (hint.includes("first")) return pos[0];
  if (hint.includes("last"))  return pos[pos.length - 1];
  
  // Standard: första g-et
  return pos[0];
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function buildWordHTML(word, extra) {
  const idx = findTargetIndex(word, extra);
  if (idx<0) return esc(word);
  return esc(word.slice(0,idx))+`<span class="target-letter">${esc(word[idx])}</span>`+esc(word.slice(idx+1));
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function updateScoreboard(){
  scoreNumEl.textContent = score;
  // Show answered count out of total, but never exceed TOTAL
  scoreTotalEl.textContent = TOTAL;
}

function updateProgress(){
  const total=items.length, done=Math.min(currentIndex,total);
  progressFill.style.width=(total?(done/total)*100:0)+"%";
  progressLabel.textContent=`${currentIndex<total?done+1:done} / ${total}`;
}

function setFeedback(state,icon,text){
  feedbackEl.className="feedback"+(state?" "+state:"");
  feedbackEl.querySelector(".feedback-icon").textContent=icon;
  feedbackText.textContent=text;
}

function renderCurrentItem(){
  const item=items[currentIndex];
  updateProgress();

  if(!item){
    wordBox.innerHTML=`<div class="finish-display"><div class="finish-score">${score}/${answeredCount}</div><p class="finish-label">Exercise complete — well done!</p></div>`;
    choicesEl.innerHTML="";
    setFeedback("correct","🎉",`You got ${score} out of ${answeredCount} correct.`);
    nextBtn.textContent="↺ Start again";
    return;
  }

  hasAnswered=false;

  wordBox.classList.add("transitioning");
  setTimeout(()=>{
    wordBox.innerHTML=`<p class="word">${buildWordHTML(item.word,item.extra)}</p>`;
    wordBox.classList.remove("transitioning");
  },180);

  setFeedback("","💡","Choose an option.");

  choicesEl.innerHTML="";
  answerOptions.forEach(option=>{
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="choice-btn";
    btn.textContent=option;
    btn.addEventListener("click",()=>handleAnswer(option,btn));
    choicesEl.appendChild(btn);
  });

  nextBtn.textContent=currentIndex>=items.length-1?"Finish →":"Next word →";
}

function handleAnswer(selected, clickedBtn) {
  if (hasAnswered) return;
  const item = items[currentIndex];
  hasAnswered = true;
  answeredCount++;

  // Inaktivera alla knappar och markera det rätta
  [...choicesEl.querySelectorAll(".choice-btn")].forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === item.answer) {
      btn.classList.add("correct");
    }
  });

  if (selected === item.answer) {
    score++;
    clickedBtn.classList.add("correct", "animate-pop");
    setFeedback("correct", "✓", "Correct!");
  } else {
    clickedBtn.classList.add("wrong", "animate-shake");
    setFeedback("wrong", "✗", `Incorrect. The correct answer is: ${item.answer}.`);
  }
  updateScoreboard();
}

// Uppdaterad renderCurrentItem
function renderCurrentItem() {
  const item = items[currentIndex];
  updateProgress();

  if (!item) {
    wordBox.innerHTML = `<div class="finish-display"><div class="finish-score">${score}/${answeredCount}</div><p class="finish-label">Exercise complete!</p></div>`;
    choicesEl.innerHTML = "";
    setFeedback("correct", "🎉", `You got ${score} out of ${answeredCount} correct.`);
    nextBtn.textContent = "↺ Start again";
    return;
  }

  hasAnswered = false;
  wordBox.classList.add("transitioning");
  setTimeout(() => {
    wordBox.innerHTML = `<p class="word">${buildWordHTML(item.word, item.extra)}</p>`;
    wordBox.classList.remove("transitioning");
  }, 180);

  setFeedback("", "💡", "Choose an option.");

  choicesEl.innerHTML = "";
  answerOptions.forEach(option => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "choice-btn";
    btn.textContent = option;
    btn.addEventListener("click", () => handleAnswer(option, btn));
    choicesEl.appendChild(btn);
  });

  nextBtn.textContent = currentIndex >= items.length - 1 ? "Finish →" : "Next word →";
}

function resetQuiz(){
  items=shuffle(allItems);
  currentIndex=score=answeredCount=0;
  hasAnswered=false;
  scoreNumEl.textContent = 0;
  scoreTotalEl.textContent = TOTAL;
  renderCurrentItem();
}

nextBtn.addEventListener("click",()=>{
  if(currentIndex>=items.length){resetQuiz();return;}
  currentIndex++;
  renderCurrentItem();
});
restartBtn.addEventListener("click",resetQuiz);

// Theme toggle
const themeInput = document.getElementById("themeToggleInput");
function applyTheme(dark) {
  document.documentElement.dataset.theme = dark ? "dark" : "light";
  themeInput.checked = dark;
  try { localStorage.setItem("sv-g-theme", dark ? "dark" : "light"); } catch(e){}
}
themeInput.addEventListener("change", () => applyTheme(themeInput.checked));
try {
  const saved = localStorage.getItem("sv-g-theme");
  if (saved === "dark") applyTheme(true);
} catch(e){}

resetQuiz();
</script>
