<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Idiomatisk svenska - dropdownövning</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --surface: #ffffff;
      --surface-2: #f0eee8;
      --text: #1d2420;
      --muted: #667069;
      --border: #d9d5cb;
      --accent: #1f7a68;
      --ok: #1f7a42;
      --bad: #b13f2f;
      --shadow: 0 16px 40px rgba(31, 42, 35, .10);
    }

    body.dark {
      color-scheme: dark;
      --bg: #171b1f;
      --surface: #22272d;
      --surface-2: #2b3239;
      --text: #f3f0e8;
      --muted: #b9c0bd;
      --border: #414a53;
      --accent: #7bc7b4;
      --ok: #75d595;
      --bad: #ff9a86;
      --shadow: 0 18px 44px rgba(0, 0, 0, .28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
      transition: background-color .2s ease, color .2s ease;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 3vw, 3rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      max-width: 68ch;
      font-size: 1rem;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }

    button {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      min-height: 42px;
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(0,0,0,.04);
    }

    button:hover { border-color: var(--accent); }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 18px 0 22px;
    }

    .stat {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 140px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: .82rem;
    }

    .stat strong { font-size: 1.2rem; }

    .exercise-list {
      display: grid;
      gap: 14px;
    }

    .exercise {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .exercise.correct { border-color: color-mix(in srgb, var(--ok) 55%, var(--border)); }
    .exercise.wrong { border-color: color-mix(in srgb, var(--bad) 55%, var(--border)); }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: .9rem;
    }

    .dialogue {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .prompt {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 14px;
      min-height: 96px;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: 0;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .prompt p { margin: 0; }

    .completion {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 14px;
      margin-top: 14px;
    }

    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
    }

    .completion-text {
      margin: 0;
      font-size: 1.05rem;
    }

    .blank {
      display: inline-block;
      min-width: 2.4em;
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0;
    }

    .select-row {
      display: grid;
      grid-template-columns: minmax(220px, 420px) 1fr;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
    }

    select:focus, button:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 34%, transparent);
      outline-offset: 2px;
    }

    .feedback {
      margin-top: 10px;
      min-height: 28px;
      font-weight: 700;
    }

    .feedback.ok { color: var(--ok); }
    .feedback.bad { color: var(--bad); }

    @media (max-width: 760px) {
      .app { width: min(100% - 20px, 1120px); padding-top: 18px; }
      header { grid-template-columns: 1fr; align-items: start; }
      .toolbar { justify-content: flex-start; }
      .dialogue { grid-template-columns: 1fr; }
      .select-row { grid-template-columns: 1fr; }
      .exercise { padding: 14px; }
    }
  </style>
</head>

    function buildCompletion(exercise) {
      const override = completionOverrides[exercise.id];

      if (override) {
        return {
          prefix: override.prefix,
          suffix: override.suffix,
          correctLabel: override.options[0],
          options: exercise.options.map((value, index) => ({
            value,
            label: override.options[index] || value
          }))
        };
      }

      const sentence = exercise.answerSentence;
      const start = sentence.toLocaleLowerCase('sv-SE').indexOf(exercise.expression.toLocaleLowerCase('sv-SE'));
      if (start === -1) {
        return {
          prefix: '',
          suffix: '',
          correctLabel: sentence,
          options: exercise.options.map(value => ({ value, label: value }))
        };
      }

      const end = start + exercise.expression.length;
      const correctLabel = sentence.slice(start, end);
      return {
        prefix: sentence.slice(0, start),
        suffix: sentence.slice(end),
        correctLabel,
        options: exercise.options.map(value => ({ value, label: value }))
      };
    }

    function renderExercises() {
      answers.clear();
      list.innerHTML = '';

      shuffle(originalExercises).forEach((exercise, index) => {
        const card = document.createElement('article');
        card.className = 'exercise';
        card.dataset.id = exercise.id;
        const completion = buildCompletion(exercise);
        const blankSuffix = completion.suffix === '.' ? '' : completion.suffix;

        const options = shuffle(completion.options)
          .map(option => `<option value="${escapeText(option.value)}">${escapeText(option.label)}</option>`)
          .join('');

        card.innerHTML = `
          <div class="meta">
            <span>Övning ${index + 1}</span>
            <span>Ursprungligt nummer ${exercise.id}</span>
          </div>
          <div class="dialogue">
            <div class="prompt">
              <span class="label">A säger</span>
              <p>${escapeText(exercise.a)}</p>
            </div>
            <div class="prompt">
              <span class="label">B vill svara att</span>
              <p>${escapeText(exercise.wants)}.</p>
            </div>
          </div>
          <div class="completion">
            <span class="label">B svarar</span>
            <p class="completion-text">
              <span>${escapeText(completion.prefix)}</span>
              <span class="blank" aria-label="Här ska ett idiomatiskt uttryck in">...</span>
              <span>${escapeText(blankSuffix)}</span>
            </p>
            <div class="select-row">
              <select aria-label="Välj korrekt uttryck för övning ${index + 1}">
                <option value="">Välj idiomatiskt uttryck...</option>
                ${options}
              </select>
              <div class="feedback" aria-live="polite"></div>
            </div>
          </div>
        `;

        const select = card.querySelector('select');
        const feedback = card.querySelector('.feedback');

        select.addEventListener('change', () => {
          const isCorrect = select.value === exercise.expression;
          card.classList.toggle('correct', Boolean(select.value) && isCorrect);
          card.classList.toggle('wrong', Boolean(select.value) && !isCorrect);
          feedback.className = `feedback ${select.value ? (isCorrect ? 'ok' : 'bad') : ''}`;

          if (!select.value) {
            feedback.textContent = '';
            answers.delete(exercise.id);
          } else if (isCorrect) {
            feedback.textContent = 'Rätt.';
            answers.set(exercise.id, true);
          } else {
            feedback.textContent = `Inte riktigt. Rätt svar är: ${completion.correctLabel}.`;
            answers.set(exercise.id, false);
          }
          updateStats();
        });

        list.appendChild(card);
      });

    function applyTheme(theme) {
