<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
    /* ==========================================================================
       1. RESET & BASICS
       ========================================================================== */
    *, *::before, *::after { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
    }

    html { 
        scroll-behavior: smooth; 
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--cream); 
        color: var(--ink);
        min-height: 100vh; 
        display: flex;
        justify-content: center; 
        align-items: flex-start;
        padding: 20px 16px 110px;
        transition: background 0.3s, color 0.3s;
        position: relative;
    }

    /* Subtil gradient-bakgrund */
    body::before {
        content: ''; 
        position: fixed; 
        inset: 0;
        background:
            radial-gradient(ellipse 55% 45% at 85% 15%, rgba(201,168,76,0.07) 0%, transparent 60%),
            radial-gradient(ellipse 45% 40% at 5% 85%, rgba(45,122,95,0.06) 0%, transparent 55%);
        pointer-events: none; 
        z-index: 0;
    }

    /* ==========================================================================
       2. DESIGN TOKENS (VARIABLES)
       ========================================================================== */
    :root {
        /* Colors - Light Mode */
        --ink: #1a1a2e; 
        --ink-light: #4a4a6a; 
        --cream: #faf8f4; 
        --warm: #f5f0e8;
        --accent: #c9a84c; 
        --accent-dark: #a8893a; 
        --accent-light: #f0e4c4;
        --green: #2d7a5f; 
        --green-light: #e8f4ef; 
        --border: #e8e2d8;
        
        /* UI Elements */
        --shadow: rgba(26,26,46,0.08); 
        --shadow-lg: rgba(26,26,46,0.16);
        --radius: 14px; 
        --card-bg: #ffffff; 
        --input-bg: var(--warm);
        --schedule-bg: #ffffff; 
        --schedule-date-bg: var(--warm);

        /* Buttons */
        --btn-dark-bg: #1a1a2e;
        --btn-dark-bg-2: #2a2a4a;
        --btn-dark-text: #ffffff;		
        --btn-accent-text: #1a1a2e;
        --btn-accent-bg: #d9c27a;
        --btn-accent-bg-2: #c9a84c;
    }

    [data-theme="dark"] {
        /* Colors - Dark Mode */
        --ink: #e8e8f0; 
        --ink-light: #9090b0; 
        --cream: #13131f; 
        --warm: #1c1c2e;
        --accent: #d4b86a; 
        --accent-dark: #e5c97b; 
        --accent-light: #25220f;
        --green: #4db38f; 
        --green-light: #0f2219; 
        --border: #2e2e45;
        
        /* UI Elements Dark */
        --shadow: rgba(0,0,0,0.35); 
        --shadow-lg: rgba(0,0,0,0.55);
        --card-bg: #1c1c2e; 
        --input-bg: #13131f;
        --schedule-bg: #1c1c2e; 
        --schedule-date-bg: #161625;

        /* Buttons Dark */
        --btn-dark-bg: #d9dde8;
        --btn-dark-bg-2: #bfc7d8;
        --btn-dark-text: #13131f;
        --btn-accent-text: #13131f;
        --btn-accent-bg: #e5c97b;
        --btn-accent-bg-2: #d4b86a;			
    }

    /* ==========================================================================
       3. COMPONENTS (MODALS, CARDS, TOGGLES)
       ========================================================================== */
    
    /* Modals */
    .modal-overlay {
        position: fixed; 
        inset: 0; 
        background: rgba(0,0,0,0.5);
        display: none; 
        justify-content: center; 
        align-items: center;
        z-index: 3000; 
        backdrop-filter: blur(6px);
    }
    .modal-overlay.open { 
        display: flex; 
        animation: fadeIn 0.2s ease; 
    }
    .modal {
        position: relative;
		background: var(--card-bg); 
        padding: 36px 32px; 
        border-radius: 20px;
        max-width: 340px; 
        width: 90%; 
        text-align: center;
        border: 1px solid var(--border); 
        box-shadow: 0 24px 60px var(--shadow-lg);
        animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-icon { font-size: 42px; margin-bottom: 12px; }
    .modal p { 
        color: var(--ink-light); 
        font-size: 15px; 
        line-height: 1.5; 
        margin-bottom: 24px; 
    }
	
	/* Container för krysset */
	.close-x {
		position: absolute;
		top: 12px;
		right: 12px;
		width: 36px;
		height: 36px;
		background: var(--warm); /* En subtil bakgrundscirkel */
		border: none;
		border-radius: 50%;
		cursor: pointer;
		display: flex;
		align-items: center;
		justify-content: center;
		z-index: 10;
		transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
	}
	
	/* Själva linjerna */
	.close-x .line {
		position: absolute;
		width: 16px;
		height: 2px;
		background-color: var(--ink-light);
		border-radius: 2px;
		transition: all 0.3s ease;
	}
	
	.close-x .line:nth-child(1) { transform: rotate(45deg); }
	.close-x .line:nth-child(2) { transform: rotate(-45deg); }
	
	/* Animationer vid hovring */
	.close-x:hover {
		transform: rotate(90deg);
		background: var(--accent-light);
	}
	
	.close-x:hover .line {
		background-color: var(--accent-dark);
		width: 18px;
	}
	
	/* För mörkt läge */
	[data-theme="dark"] .close-x {
		background: var(--warm);
	}
	[data-theme="dark"] .close-x .line {
		background-color: var(--ink);
	}
	
    /* Theme Toggle Button */
    .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        background: var(--card-bg);
        border: 1.5px solid var(--border);
        width: 42px;
        height: 42px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        z-index: 2000;
        box-shadow: 0 4px 12px var(--shadow);
    }
    .theme-toggle:hover { 
        border-color: var(--accent); 
        transform: scale(1.05);
    }
    .theme-toggle:active #theme-icon { transform: scale(0.9); }
    #theme-icon { display: flex; line-height: 1; }
    #theme-icon svg { stroke: currentColor; display: block; }
    [data-theme="dark"] .theme-toggle {
        color: #f3df9a;
        background: var(--card-bg);
    }

    /* Cards - General Layout */
    .card {
        background: var(--card-bg); 
        border: 1px solid var(--border);
        border-radius: var(--radius); 
        padding: 24px 28px; 
        margin-bottom: 14px;
        box-shadow: 0 2px 12px var(--shadow); 
        transition: background 0.3s, border-color 0.3s;
    }
    .card-label {
        display: flex; 
        align-items: center; 
        gap: 8px;
        font-size: 11px; 
        font-weight: 600; 
        letter-spacing: 0.09em;
        text-transform: uppercase; 
        color: var(--ink-light); 
        margin-bottom: 12px;
    }
    .card-label .dot { 
        width: 6px; 
        height: 6px; 
        border-radius: 50%; 
        background: var(--accent); 
    }

    /* ==========================================================================
       4. LOGIN SECTION
       ========================================================================== */
    #login-overlay {
        position: fixed; 
        inset: 0; 
        background: var(--cream);
        display: flex; 
        justify-content: center; 
        align-items: center;
        z-index: 1000; 
        animation: fadeIn 0.4s ease;
    }
    .login-card {
        background: var(--card-bg); 
        border: 1px solid var(--border);
        border-radius: 24px; 
        padding: 52px 52px; 
        max-width: 500px; 
        width: 90%;
        text-align: center; 
        box-shadow: 0 12px 48px var(--shadow-lg);
        position: relative; 
        overflow: hidden;
    }
    .login-card::before {
        content: ''; 
        position: absolute; 
        top: 0; left: 0; right: 0; 
        height: 3px;
        background: linear-gradient(90deg, var(--accent), var(--green), var(--accent));
        background-size: 200%; 
        animation: shimmer 3s linear infinite;
    }
    .login-icon {
        width: 68px; 
        height: 68px;
        background: #f0e4c4;
        border-radius: 50%;
        display: flex; 
        align-items: center; 
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 30px;
    }
    [data-theme="dark"] .login-icon { background: #f0e4c4; color: #a8893a; }
    .login-card h2 { 
        font-family: 'Playfair Display', serif; 
        font-size: 26px; 
        font-weight: 700; 
        margin-bottom: 8px; 
    }
    .login-card > p { 
        color: var(--ink-light); 
        font-size: 14px; 
        margin-bottom: 28px; 
        line-height: 1.5; 
    }
    .login-input-wrap { position: relative; margin-bottom: 14px; }
    .login-input-wrap input {
        width: 100%; 
        padding: 13px 16px 13px 44px; 
        border: 1.5px solid var(--border);
        border-radius: 10px; 
        font-size: 15px; 
        font-family: 'DM Sans', sans-serif;
        background: var(--input-bg); 
        color: var(--ink); 
        outline: none;
        transition: border-color 0.2s, background 0.2s; 
        letter-spacing: 0.08em;
    }
    .login-input-wrap .icon {
        position: absolute; 
        left: 14px; 
        top: 50%; 
        transform: translateY(-50%);
        font-size: 16px; 
        pointer-events: none;
    }
    #error-msg { 
        color: #e05252; 
        font-size: 13px; 
        margin-bottom: 12px; 
        display: none; 
    }

    /* ==========================================================================
       5. MAIN CONTENT & HEADER
       ========================================================================== */
    #main-content {
        display: none; 
        max-width: 660px; 
        width: 100%;
        margin: 0 auto; 
        position: relative; 
        z-index: 1;
        animation: slideUp 0.5s ease;
    }
    .page-header { text-align: center; padding: 44px 0 28px; }
    .header-badge {
        display: inline-flex; 
        align-items: center; 
        gap: 6px;
        background: var(--accent-light); 
        color: var(--accent-dark);
        font-size: 11px; 
        font-weight: 600; 
        letter-spacing: 0.1em;
        text-transform: uppercase; 
        padding: 6px 14px; 
        border-radius: 20px; 
        margin-bottom: 18px;
    }
    .page-header h1 {
        font-family: 'Playfair Display', serif; 
        font-size: clamp(26px,5vw,38px);
        font-weight: 700; 
        line-height: 1.15; 
        margin-bottom: 10px;
    }
    .page-header p { color: var(--ink-light); font-size: 15px; font-weight: 300; }

    /* Language Switchers */
    .lang-switcher { 
        display: flex; 
        justify-content: center; 
        gap: 8px; 
        margin-bottom: 28px; 
        flex-wrap: wrap; 
    }
    .login-lang-switcher { margin-bottom: 20px; flex-wrap: nowrap; gap: 4px; }
    .lang-btn {
        display: flex; 
        align-items: center; 
        gap: 6px; 
        padding: 8px 15px;
        border: 1.5px solid var(--border); 
        border-radius: 8px; 
        background: var(--card-bg);
        cursor: pointer; 
        font-size: 13px; 
        font-weight: 500; 
        color: var(--ink-light);
        font-family: 'DM Sans', sans-serif; 
        transition: all 0.2s;
    }
    .lang-btn svg { width: 20px; height: auto; border-radius: 2px; flex-shrink: 0; }
    .login-lang-switcher .lang-btn { padding: 5px 8px; font-size: 12px; gap: 4px; white-space: nowrap; }
    .login-lang-switcher .lang-btn svg { width: 16px; }

    /* Lang Button States */
    .lang-btn:hover { border-color: var(--accent); color: var(--accent-dark); }
    .lang-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent-dark); }
    
    [data-theme="dark"] .lang-btn { color: #d7dbea; background: #181826; }
    [data-theme="dark"] .lang-btn.active { background: #3a3218; color: #f3df9a; border-color: #d4b86a; }
    [data-theme="dark"] .lang-btn:hover { color: #f3df9a; border-color: #d4b86a; }

    /* Inputs */
    .name-input-wrap input {
        width: 100%; 
        padding: 13px 16px; 
        border: 1.5px solid var(--border);
        border-radius: 10px; 
        font-size: 16px; 
        font-family: 'DM Sans', sans-serif;
        background: var(--input-bg); 
        color: var(--ink); 
        outline: none;
        transition: border-color 0.2s, background 0.2s;
    }
    .name-input-wrap input:focus { border-color: var(--accent); background: var(--card-bg); }
    .name-input-wrap input::placeholder { color: var(--ink-light); opacity: 0.6; }

    /* ==========================================================================
       6. SCHEDULE & SLOTS
       ========================================================================== */
    .tz-notice {
        display: flex; 
        align-items: center; 
        gap: 9px;
        background: var(--green-light); 
        color: var(--green);
        border: 1px solid rgba(45,122,95,0.15); 
        border-radius: 10px;
        padding: 10px 16px; 
        font-size: 13px; 
        font-weight: 500; 
        margin-bottom: 14px;
    }
    .schedule-card {
        background: var(--schedule-bg); 
        border: 1px solid var(--border);
        border-radius: var(--radius); 
        overflow: hidden;
        margin-bottom: 14px; 
        box-shadow: 0 2px 12px var(--shadow);
        transition: background 0.3s;
    }
    .schedule-header { padding: 18px 28px 14px; border-bottom: 1px solid var(--border); }
    .date-group { border-bottom: 1px solid var(--border); }
    .date-group:last-child { border-bottom: none; }
    .date-row { display: flex; align-items: stretch; }
    .date-label {
        padding: 16px 22px; 
        min-width: 140px; 
        font-weight: 600; 
        font-size: 14px;
        background: var(--schedule-date-bg); 
        border-right: 1px solid var(--border);
        display: flex; 
        flex-direction: column; 
        justify-content: center;
        transition: background 0.3s; 
        flex-shrink: 0;
    }
    .date-label .weekday {
        font-size: 10px; 
        font-weight: 500; 
        color: var(--ink-light);
        text-transform: uppercase; 
        letter-spacing: 0.08em; 
        display: block; 
        margin-bottom: 3px;
    }
    .slots-row {
        display: flex; 
        flex-wrap: wrap; 
        gap: 8px;
        padding: 14px 20px; 
        flex: 1; 
        align-items: center;
    }

    /* Slot Buttons */
    .slot-btn { position: relative; }
    .slot-btn input { position: absolute; opacity: 0; width: 0; height: 0; }
    .slot-btn label {
        display: flex; 
        align-items: center; 
        gap: 7px; 
        padding: 8px 14px;
        border: 1.5px solid var(--border); 
        border-radius: 8px; 
        cursor: pointer;
        font-size: 14px; 
        font-weight: 500; 
        color: var(--ink-light); 
        background: var(--input-bg);
        transition: all 0.18s; 
        user-select: none; 
        white-space: nowrap;
    }
    .slot-btn label:hover { border-color: var(--accent); color: var(--accent-dark); background: var(--accent-light); }
    .slot-btn input:checked + label { border-color: var(--green); background: var(--green-light); color: var(--green); }
    
    [data-theme="dark"] .slot-btn label { color: #d7dbea; background: #161622; }
    [data-theme="dark"] .slot-btn label:hover { background: #2a2412; color: #f3df9a; border-color: #d4b86a; }
    [data-theme="dark"] .slot-btn input:checked + label { background: #143126; color: #7be0b8; border-color: #4db38f; }		

    .check-icon {
        width: 16px; 
        height: 16px; 
        border: 1.5px solid currentColor; 
        border-radius: 4px;
        display: flex; 
        align-items: center; 
        justify-content: center;
        background: transparent; 
        flex-shrink: 0; 
        transition: all 0.18s; 
        opacity: 0.35;
    }
    .check-icon svg { opacity: 0; transition: opacity 0.15s; }
    .slot-btn input:checked + label .check-icon { background: var(--green); border-color: var(--green); opacity: 1; }
    .slot-btn input:checked + label .check-icon svg { opacity: 1; }

    /* ==========================================================================
       7. SUMMARY & FOOTER BUTTONS
       ========================================================================== */
    .selection-summary {
        margin-bottom: 14px; 
        padding: 16px 20px;
        background: var(--green-light); 
        border: 1px solid rgba(45,122,95,0.2);
        border-radius: var(--radius); 
        display: none; 
        animation: fadeIn 0.3s ease;
    }
    .selection-summary.visible { display: block; }
    .summary-label {
        font-size: 11px; 
        font-weight: 600; 
        letter-spacing: 0.09em;
        text-transform: uppercase; 
        color: var(--green); 
        margin-bottom: 10px;
    }
    .selected-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .selected-chip {
        display: flex; 
        align-items: center; 
        gap: 6px;
        background: var(--card-bg); 
        border: 1px solid rgba(45,122,95,0.25);
        color: var(--green); 
        border-radius: 6px; 
        padding: 5px 8px 5px 11px;
        font-size: 13px; 
        font-weight: 500;
    }
    .selected-chip button {
        background: none; border: none; cursor: pointer; color: var(--green);
        font-size: 17px; line-height: 1; padding: 0; opacity: 0.45;
        transition: opacity 0.15s; display: flex; align-items: center;
    }
    .selected-chip button:hover { opacity: 1; }

    /* Action Buttons */
    .btn-login, .btn-submit, .btn-modal {
        font-family: 'DM Sans', sans-serif;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }

    .btn-submit {
        gap: 10px;
        width: 100%;
        background: linear-gradient(135deg, var(--btn-dark-bg), var(--btn-dark-bg-2));
        color: var(--btn-dark-text);
        border: none;
        padding: 17px;
        border-radius: var(--radius);
        font-size: 16px;
        margin-bottom: 16px;
        box-shadow: 0 4px 20px var(--shadow-lg);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--shadow-lg); }
    .btn-submit .arrow { transition: transform 0.2s; }
    .btn-submit:hover .arrow { transform: translateX(4px); }

    .btn-login {
        width: 100%;
        background: linear-gradient(135deg, var(--btn-dark-bg), var(--btn-dark-bg-2));
        color: var(--btn-dark-text);
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-size: 15px;
        gap: 8px;
        box-shadow: 0 4px 16px var(--shadow-lg);
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 22px var(--shadow-lg); }

    .btn-sticky-send {
        background: linear-gradient(135deg, var(--btn-accent-bg), var(--btn-accent-bg-2));
        color: var(--btn-accent-text);
        border: none;
        padding: 10px 20px;
        border-radius: 50px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 7px;
        transition: transform 0.15s, box-shadow 0.15s;
        box-shadow: 0 4px 14px rgba(45,122,95,0.35);
    }
    .btn-sticky-send:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,122,95,0.45); }

    /* ==========================================================================
       8. ANIMATIONS
       ========================================================================== */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes shake {
        0%,100% { transform: translateX(0); }
        20% { transform: translateX(-8px); }
        60% { transform: translateX(6px); }
        80% { transform: translateX(-4px); }
    }

    /* ==========================================================================
       9. RESPONSIVE DESIGN
       ========================================================================== */
    @media (max-width: 520px) {
        body { padding: 60px 12px 40px; }
        .login-card { padding: 36px 24px; }
        .page-header { padding: 28px 0 20px; }
        .card { padding: 20px; }
        .schedule-header { padding: 14px 20px 12px; }
        
        .date-row { flex-direction: column; }
        .date-label {
            border-right: none; 
            border-bottom: 1px solid var(--border);
            flex-direction: row; 
            align-items: center; 
            gap: 8px;
            min-width: unset; 
            padding: 10px 16px;
        }
        .date-label .weekday { margin-bottom: 0; }
        .slots-row { padding: 10px 16px 14px; }
        
        .sticky-controls { 
            width: calc(100% - 32px); 
            justify-content: space-between; 
            border-radius: 50px; 
            padding: 8px 8px 8px 16px; 
        }
        .theme-toggle { top: 15px; right: 15px; width: 38px; height: 38px; }
    }
</style>
</head>
<body>

<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <button class="close-x" onclick="closeModal()" aria-label="Stäng">
            <span class="line"></span>
            <span class="line"></span>
        </button>
        
        <div class="modal-icon" id="modal-icon">⚠️</div>
        <p id="modal-text" style="margin-bottom: 0;"></p> </div>
</div>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Byt tema">
    <span id="theme-icon"></span>
</button>

<div id="login-overlay">
    <div class="login-card">
        <div class="lang-switcher login-lang-switcher">
            <button class="lang-btn active" data-lang="sv" onclick="setLang('sv')">
                <svg viewBox="0 0 640 480"><path fill="#006aa7" d="M0 0h640v480H0z"/><path fill="#fecc00" d="M0 192h640v96H0z"/><path fill="#fecc00" d="M176 0h96v480h-96z"/></svg>
                Svenska
            </button>
            <button class="lang-btn" data-lang="en" onclick="setLang('en')">

let lang = 'sv', darkMode = false;

function _v_auth() {

        e.style.display = 'block'; e.style.animation = 'none';

    }
}

function localizeDate(d) {
    const [year, month, day] = d.split('-').map(Number);
    const date = new Date(year, month - 1, day);

    const monthNames = {
        sv: ['januari', 'februari', 'mars', 'april', 'maj', 'juni', 'juli', 'augusti', 'september', 'oktober', 'november', 'december'],
        en: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
        de: ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'],
        nl: ['januari', 'februari', 'maart', 'april', 'mei', 'juni', 'juli', 'augustus', 'september', 'oktober', 'november', 'december']
    };

    return `${day} ${monthNames[lang][month - 1]}`;
}

        const el = document.getElementById(id);
        if (el) el.innerText = val;
    }
    document.getElementById('theme-btn').title = t.themeTitle;
    document.getElementById('student-name').placeholder = t.placeholder;
    document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === l);

        renderSchedule(false);

    }

async function fetchScheduleData() {
    const url = 'https://script.google.com/macros/s/AKfycbxr-UV4LADD7PHLX36iTjdYKR4eYEHxjdNjkKSSoXDaBWmtwGV8jF_oJwVIPqR3E7Tm/exec?t=' + Date.now();
    const response = await fetch(url, { cache: 'no-store' });
    cachedData = await response.json();
}

function renderScheduleFromData(data) {
    const container = document.getElementById('schedule');
    const checked = new Set(
        Array.from(document.querySelectorAll('#schedule input[type=checkbox]:checked'))
            .map(el => el.dataset.raw)
    );
    const t = T[lang];

    if (!data || data.length === 0) {
        container.innerHTML = `<div style="padding:40px; text-align:center; color:var(--ink-light);">${t.noSlots}</div>`;
        return;
    }

    // 1. Skapa ett datum-objekt för "idag" (nollställt till midnatt för ren datumjämförelse)
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const grouped = {};
    
    data.forEach(item => {
        if (!item.date) return;

        let cleanDateStr = item.date.toString().trim();
        
        // 2. Kontrollera om datumet har passerat
        const itemDate = new Date(cleanDateStr);
        if (itemDate < today) {
            return; // Hoppa över detta datum om det är i det förflutna
        }

        if (!grouped[cleanDateStr]) {
            grouped[cleanDateStr] = {
                date: cleanDateStr,
                day: item.day,
                slots: []
            };
        }

        grouped[cleanDateStr].slots.push({
            time: item.time,
            id: item.id
        });
    });

    // Rensa containern
    container.innerHTML = '';

    const sortedDates = Object.values(grouped);
    
    if (sortedDates.length === 0) {
        container.innerHTML = `<div style="padding:40px; text-align:center; color:var(--ink-light);">${t.noSlots}</div>`;
        return;
    }

    sortedDates.forEach((dateGroup, idx) => {
        const weekday = t.weekdays[dateGroup.day] || dateGroup.day;
        const locDate = localizeDate(dateGroup.date);

        const slotsHtml = dateGroup.slots.map(slot => {
            const raw = `${dateGroup.date} ${slot.time}`;
            const displayTime = t.formatTime(slot.time);
            const display = `${locDate} ${displayTime}`;
            const inputId = `s${idx}_${slot.time.replace(':','')}`;

            return `
                <div class="slot-btn">
                    <input type="checkbox" 
                        id="${inputId}" 
                        data-id="${slot.id}" 
                        data-raw="${raw}" 
                        data-display="${display}" 
                        ${checked.has(raw) ? 'checked' : ''} 
                        onchange="updateSummary()">
                    <label for="${inputId}">
                        <span class="check-icon">
                            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                                <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        ${displayTime}
                    </label>
                </div>`;
        }).join('');

        container.innerHTML += `
            <div class="date-group">
                <div class="date-row">
                    <div class="date-label">
                        <span class="weekday">${weekday}</span>
                        ${locDate}
                    </div>
                    <div class="slots-row">
                        ${slotsHtml}
                    </div>
                </div>
            </div>`;
    });
}

async function renderSchedule(forceRefresh = false) {
    const container = document.getElementById('schedule');
    const t = T[lang];

    if (forceRefresh || !cachedData) {
        container.innerHTML = `
            <div style="padding:40px; text-align:center; color:var(--ink-light); font-style:normal; font-size:14px;">
                <span style="display:block; margin-bottom:10px; font-size:24px;">⌛</span>
                ${t.loadingSchedule}
            </div>
        `;

        try {
            await fetchScheduleData();
        } catch (error) {
            console.error("Fetch error:", error);
            container.innerHTML = `
                <div style="padding:40px; text-align:center; color:#e05252;">
                    ${t.scheduleFetchError}
                </div>`;
            return;
        }
    }

    renderScheduleFromData(cachedData);
}

function updateSummary() {
    const selected = Array.from(document.querySelectorAll('input[type=checkbox]:checked'));
    const summary = document.getElementById('summary');
    const list = document.getElementById('selected-list');

    if (!selected.length) {
        summary.classList.remove('visible');
        list.innerHTML = '';

    summary.classList.add('visible');
    list.innerHTML = selected.map(cb =>
        `<div class="selected-chip">📅 ${cb.dataset.display}

async function sendBooking() {
    const nameInput = document.getElementById('student-name');
    const name = nameInput.value.trim();
    const selected = Array.from(document.querySelectorAll('input[type=checkbox]:checked'));
    const t = T[lang];

    if (!name) { 
        openModal(t.alertNameIcon, t.alertName, t.okBtn); 
        return; 
    }

    if (!selected.length) { 
        openModal(t.alertTimeIcon, t.alertTime, t.okBtn); 
        return; 
    }

    const sendBtns = document.querySelectorAll('.btn-submit, .btn-sticky-send');
    sendBtns.forEach(b => { 
        b.disabled = true; 
        b.style.opacity = '0.5'; 
    });

    const bookingData = {
        name: name,
        ids: selected.map(cb => parseInt(cb.dataset.id)),
        details: selected.map(cb => cb.dataset.display).join('\n')
    };

    const url = "https://script.google.com/macros/s/AKfycbxr-UV4LADD7PHLX36iTjdYKR4eYEHxjdNjkKSSoXDaBWmtwGV8jF_oJwVIPqR3E7Tm/exec";

    try {
        await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(bookingData)
        });
    } catch (err) {
        console.warn("Ignorerat fetch-fel:", err);
    }

try {
    openModal(
        '✅',
        lang === 'sv'
            ? 'Tack! Din bokning är mottagen.'
            : lang === 'en'
                ? 'Thank you! Your booking has been received.'
                : lang === 'de'
                    ? 'Danke! Ihre Buchung wurde empfangen.'
                    : 'Dank u! Uw boeking is ontvangen.'
    );

    selected.forEach(cb => cb.checked = false);
    nameInput.value = '';
    updateSummary();

    await renderSchedule(true);

    setTimeout(() => {
        closeModal();
    }, 2000);

} finally {
    sendBtns.forEach(b => { 
        b.disabled = false; 
        b.style.opacity = '1'; 
    });
}
}
</script>
</body>
</html>
