<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swedish Word Stress — Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --ink:    #1a1a2e;
    --paper:  #faf8f3;
    --cream:  #f0ece0;
    --gold:   #c9a84c;
    --gold2:  #e8c97a;
    --blue:   #2d5a8e;
    --blue2:  #3a7bd5;
    --green:  #2d7a5a;
    --red:    #9e2a2a;
    --muted:  #8a8070;
    --card-bg: white;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 20%, rgba(201,168,76,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 85% 75%, rgba(45,90,142,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 900px;
  }

  header { text-align: center; margin-bottom: 40px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 44px); font-weight: 900; margin-bottom: 8px; }
  header h1 span { color: var(--gold); }
  header p { font-size: 15px; color: var(--muted); letter-spacing: 0.3px; }

  .progress-section { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; max-width: 700px; margin: 0 auto 28px; }
  .progress-track { flex: 1; height: 6px; background: var(--cream); border-radius: 99px; overflow: hidden; border: 1px solid rgba(201,168,76,0.2); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); transition: width 0.5s ease; box-shadow: 0 0 8px rgba(201,168,76,0.4); }
  .progress-label { font-size: 13px; font-weight: 600; color: var(--muted); min-width: 48px; text-align: right; }

  .score-row { display: flex; justify-content: center; gap: 48px; margin-bottom: 32px; }
  .score-badge { display: flex; flex-direction: column; align-items: center; }
  .score-number { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; }
  .score-number.correct { color: var(--green); }
  .score-number.wrong { color: var(--red); }
  .score-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 32px;
    box-shadow: 0 4px 24px rgba(26,26,46,0.08);
    border: 1px solid rgba(201,168,76,0.18);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold)); }

.word-row-container {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 15px; /* Fast avstånd mellan elementen */
    margin: 30px auto; /* Centrerar hela gridden */
    max-width: 800px;  /* Justera detta värde för att styra max-avståndet */
    width: 100%;
}

  .side-text { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--ink); position: relative; }
.side-text.swedish { 
    display: flex;
	font-size: 20px;       /* Något mindre än svenskan (som är 24px) */
    flex-direction: column;
    align-items: flex-end; /* Trycker det svenska ordet mot höger (mot mitten) */
    text-align: right;
	margin-right: 25px;
}
.side-text.english { 
    text-align: left;
    display: flex;
    align-items: flex-start;
	margin-left: 25px;
    
    /* Utseende */
    font-size: 18px;       /* Något mindre än svenskan (som är 24px) */
    font-style: italic;    /* Kursiv */
    font-weight: 400;      /* Tunnare typsnitt */
    color: var(--muted);   /* Gråaktig färg för att markera att det är översättning */
    
    /* Positionering */
    flex: 1;               /* Tar upp tillgänglig plats */
    justify-content: flex-start; /* Håller texten startad mot mitten-kolumnen */
}

  /* Audio Button Styles */
.audio-btn {
  display: none;
  background: var(--gold);
  color: white;
  border: none;
  width: 28px; /* Något mindre för att passa i pillret */
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 12px;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-left: 12px; /* Skapar avstånd till texten */
}
.audio-btn:hover { transform: scale(1.1); background: var(--gold2); }
.audio-btn.visible { display: flex; }

@keyframes fadeInScale { 
  from { opacity: 0; transform: translateX(-50%) scale(0.5); } 
  to { opacity: 1; transform: translateX(-50%) scale(1); } 
}

  .word-display { display: flex; gap: 6px; flex-wrap: wrap; gap: 12px; justify-content: center; }

.syllable-btn {
  width: auto;
  min-width: 60px;
  height: 50px; 
  display: flex; 
  align-items: center; 
  justify-content: center;
  font-family: 'Playfair Display', serif; 
  font-size: 24px; 
  font-weight: 700;
  padding: 0 20px;
  border-radius: 12px; 
  border: 2px solid var(--cream); 
  background: var(--paper);
  cursor: pointer; 
  transition: all 0.18s cubic-bezier(0.4,0,0.2,1); 
  position: relative; 
  outline: none;
  white-space: nowrap;
}

  .syllable-btn:hover:not(:disabled) { border-color: var(--gold); background: #fffdf5; transform: translateY(-2px); }
  .syllable-btn.active { border-color: var(--blue2); background-color: #f0f7ff; color: var(--blue); transform: translateY(-2px); box-shadow: 0 0 0 2px var(--blue2), 0 8px 20px rgba(58, 123, 213, 0.15); }
  
  .syllable-btn.reveal-correct { border-color: var(--green); background: #e8f5ef; color: var(--green); }
  .syllable-btn.reveal-wrong { border-color: var(--red); background: #fdeaea; color: var(--red); animation: shake 0.35s ease; }
  .syllable-btn.reveal-missed { border-color: var(--gold); background: #fdf8ec; color: var(--gold); border-style: dashed; }
  
  .syllable-btn.reveal-correct::before, .syllable-btn.reveal-missed::before {
    content: attr(data-stress); position: absolute; top: -38px; left: 50%; transform: translateX(-50%);
    font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 800; color: inherit;
  }

  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

  .feedback-area { min-height: 60px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
  .feedback-pill { display: flex; align-items: center; gap: 10px; padding: 12px 22px; border-radius: 99px; font-size: 15px; font-weight: 600; animation: slideUp 0.3s ease; }
  .feedback-pill.correct { background: #e8f5ef; color: var(--green); border: 1.5px solid rgba(45,122,90,0.25); }
  .feedback-pill.wrong { background: #fdeaea; color: var(--red); border: 1.5px solid rgba(158,42,42,0.2); }

  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .btn-row { display: flex; gap: 12px; justify-content: center; }
  .btn { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 12px 28px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.16s ease; outline: none; }
  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: #2d2d4a; transform: translateY(-1px); }
  .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: white; box-shadow: 0 4px 14px rgba(201,168,76,0.3); }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(201,168,76,0.4); }

  .completion { text-align: center; padding: 48px 32px; }
  .final-score { display: flex; justify-content: center; gap: 32px; margin: 36px 0; }
  .final-badge { background: var(--cream); border-radius: 16px; padding: 20px 28px; border: 1px solid rgba(201,168,76,0.2); }
  .final-badge .num { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; display: block; line-height: 1; }
  .final-badge .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; font-weight: 500; margin-top: 4px; display: block; }
  
  kbd { background: white; border: 1px solid #ccc; padding: 2px 7px; border-radius: 5px; font-size: 11px; box-shadow: 0 1px 0 #ccc; }
  .keyboard-hint { text-align: center; margin-top: 24px; font-size: 14px; color: black; letter-spacing: 0.5px; }
  
/* Dark Mode Variables */
body.dark-mode {
  --ink:      #e0e0e0;
  --paper:    #121212;
  --cream:    #2a2a2a;
  --gold:      #d4af37;
  --gold2:    #f1d58a;
  --muted:    #a0a0a0;
  --card-bg:  #1e1e1e;
  --btn-bg:    #2d2d2d;
  --btn-border: #404040;
}

body.dark-mode .card {
  background: var(--card-bg);
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

body.dark-mode .syllable-btn {
  background: var(--btn-bg);
  color: var(--ink);
  border-color: var(--btn-border);
}

body.dark-mode .syllable-btn:hover:not(:disabled) {
  background: #383838;
  border-color: var(--gold);
}

body.dark-mode .syllable-btn.active {
  background-color: #1a3a5f;
  border-color: var(--blue2);
  color: #fff;
}

body.dark-mode .side-text.swedish { color: #fff; }
body.dark-mode .side-text.english { color: var(--muted); }

body.dark-mode kbd {
  background: #333;
  color: #eee;
  border-color: #444;
  box-shadow: 0 1px 0 #000;
}

body.dark-mode .btn-primary {
  background: var(--gold);
  color: #121212;
  font-weight: 700;
}

body.dark-mode .btn-primary:hover {
  background: var(--gold2);
  transform: translateY(-2px);
}

body.dark-mode .keyboard-hint {
  color: var(--muted);
}

  .theme-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    background: var(--cream);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--ink);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.2s ease;
    z-index: 100;
    padding: 0;
    line-height: 1;
  }
  
  .theme-toggle:hover {
    transform: scale(1.1);
    border-color: var(--gold);
  }

  .theme-toggle i {
    font-size: 16px;
    line-height: 1;
    display: block;
  }

  .card { background: var(--card-bg); }
  .syllable-btn { background: var(--cream); color: var(--ink); border-color: var(--cream); }
  .syllable-btn:hover:not(:disabled) { background: var(--paper); }
  kbd { background: var(--cream); color: var(--ink); border-color: var(--muted); }
  .keyboard-hint { color: var(--muted); }
  
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
  <i class="fas fa-moon"></i>
</button>

<div class="container">
  <header>
    <h1>Swedish Word <span>Stress</span></h1>
    <p>Click the syllable(s) that carry the main stress in each word</p>
  </header>

  <div class="progress-section">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-label" id="progressLabel">0 / 0</span>
  </div>

  <div class="score-row">
    <div class="score-badge"><span class="score-number correct" id="scoreCorrect">0</span><span class="score-label">Correct</span></div>
    <div class="score-badge"><span class="score-number wrong" id="scoreWrong">0</span><span class="score-label">Wrong</span></div>
  </div>

  <div class="card" id="mainCard">
    <div class="word-row-container">
        <div class="side-text swedish" id="fullSwedishContainer">
            <span id="fullSwedish"></span>
        </div>
        <div class="word-display" id="wordDisplay"></div>
        <div class="side-text english" id="fullEnglish"></div>
    </div>
    <div class="feedback-area" id="feedbackArea"></div>
    <div class="btn-row" id="btnRow">
      <button class="btn btn-primary" onclick="checkAnswer()">Check</button>
    </div>
  </div>

  <div class="keyboard-hint">
    Press <kbd>Space</kbd> to check answer ··· <kbd>Space</kbd> for next word ··· <kbd>1–5</kbd> to select syllables ··· <kbd>Enter</kbd> to play sound
  </div>
</div>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let queue = shuffle([...Array(words.length).keys()]);
let current = 0;
let selected = new Set();
let checked = false;
let scoreCorrect = 0;
let scoreWrong = 0;
let audioObj = null;

function updateProgress() {
  const pct = (current / words.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = current + ' / ' + words.length;
  document.getElementById('scoreCorrect').textContent = scoreCorrect;
  document.getElementById('scoreWrong').textContent = scoreWrong;
}

function render() {
  checked = false;
  selected.clear();
  
  // Rensar feedback-ytan (och därmed även den gamla ljudknappen)
  document.getElementById('feedbackArea').innerHTML = '';

  const w = words[queue[current]];
  
  document.getElementById('fullSwedish').textContent = w.syllables.join('');
  document.getElementById('fullEnglish').textContent = w.tr;

  const container = document.getElementById('wordDisplay');
  container.innerHTML = '';

  w.syllables.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'syllable-btn';
    btn.textContent = s;
    btn.onclick = () => toggleSyllable(i, btn);
    container.appendChild(btn);
  });

  document.getElementById('btnRow').innerHTML = `<button class="btn btn-primary" onclick="checkAnswer()">Check</button>`;
  updateProgress();
}

function toggleSyllable(i, btn) {
  if (checked) return;
  if (selected.has(i)) { selected.delete(i); btn.classList.remove('active'); }
  else { selected.add(i); btn.classList.add('active'); }
}

function checkAnswer() {
  if (checked) { nextWord(); return; }
  
  // Om ingen stavelse valts, visa bara ett varningsmeddelande utan play-knapp
  if (selected.size === 0) { 
    document.getElementById('feedbackArea').innerHTML = `<div class="feedback-pill wrong"><span>Please select a syllable!</span></div>`;
    return; 
  }

  checked = true;
  const w = words[queue[current]];
  const btns = document.querySelectorAll('.syllable-btn');
  const correctSet = new Set([...(w.primary || []), ...(w.secondary || [])]);

  let isCorrect = true;
  btns.forEach((btn, i) => {
    btn.disabled = true;
    let mark = "";
    if (w.polysyllabic) {
      if (w.primary?.includes(i)) mark = "1";
      else if (w.secondary?.includes(i)) mark = "2";
    } else {
      if (w.primary?.includes(i)) mark = "⬇️";
    }
    btn.setAttribute('data-stress', mark);

    if (correctSet.has(i) && selected.has(i)) {
      btn.classList.add('reveal-correct');
    } else if (correctSet.has(i)) {
      btn.classList.add('reveal-missed');
      isCorrect = false;
    } else if (selected.has(i)) {
      btn.classList.add('reveal-wrong');
      isCorrect = false;
    }
  });

  // Här anropas showFeedback som nu skapar play-knappen till höger om texten
  if (isCorrect && selected.size === correctSet.size) {
    scoreCorrect++;
    showFeedback('Correct!', 'correct');
  } else {
    scoreWrong++;
    showFeedback('Not quite!', 'wrong');
  }

  updateProgress();
  document.getElementById('btnRow').innerHTML = `<button class="btn btn-gold" onclick="nextWord()">Next word →</button>`;
}

function playAudio() {
  const w = words[queue[current]];
  if (!w.audio) return;
  
  if (audioObj) { audioObj.pause(); audioObj.currentTime = 0; }
  audioObj = new Audio(w.audio);
  audioObj.play().catch(e => console.log("Audio play failed", e));
}

function showFeedback(msg, type) {
  // Skapar pillret med texten OCH play-knappen bredvid varandra
  document.getElementById('feedbackArea').innerHTML = `
    <div class="feedback-pill ${type}">
      <span>${msg}</span>
      <button class="audio-btn visible" onclick="playAudio()" title="Play pronunciation">
        <i class="fas fa-play"></i>
      </button>
    </div>`;
}
function nextWord() {
  current++;
  if (current >= words.length) { showCompletion(); return; }
  render();
}

function showCompletion() {
  const pct = Math.round((scoreCorrect / words.length) * 100);
  document.getElementById('mainCard').innerHTML = `
    <div class="completion">
      <h2>Complete!</h2>
      <div class="final-score">
        <div class="final-badge"><span class="num" style="color:var(--green)">${scoreCorrect}</span><span class="lbl">Correct</span></div>
        <div class="final-badge"><span class="num" style="color:var(--gold)">${pct}%</span><span class="lbl">Score</span></div>
      </div>
      <button class="btn btn-gold" onclick="location.reload()">Start over</button>
    </div>`;
}

function toggleTheme() {
  const body = document.body;
  const btn = document.getElementById('themeBtn');
  
  body.classList.toggle('dark-mode');
  
  const isDark = body.classList.contains('dark-mode');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  
  btn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
}

(function() {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
  }
})();

document.addEventListener('keydown', e => {
  // Mellanslag hanterar Check/Next
  if (e.key === ' ') { 
    e.preventDefault(); 
    if (checked) nextWord(); else checkAnswer(); 
  }
  
  // Enter spelar ljud (om svaret är kollat)
  if (e.key === 'Enter') {
    e.preventDefault();
    if (checked) playAudio();
  }

  // Siffertangenter 1–9 väljer stavelser
  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    const btns = document.querySelectorAll('.syllable-btn');
    if (idx < btns.length && !checked) btns[idx].click();
  }
  
  // Behåll P som alternativ för ljud
  if (e.key.toLowerCase() === 'p' && checked) playAudio();
});

render();
</script>
